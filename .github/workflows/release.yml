name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['.--release_created'] }}
      version: ${{ steps.release.outputs['.--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  docker:
    needs: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name and tags
        id: meta
        env:
          RELEASE_CREATED: ${{ needs.release-please.outputs.release_created }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA=$(git rev-parse --short HEAD)
          {
            echo "tags<<EOF"
            echo "${IMAGE}:main"
            echo "${IMAGE}:${SHORT_SHA}"
            if [ "${RELEASE_CREATED}" = "true" ]; then
              echo "${IMAGE}:latest"
              echo "${IMAGE}:${RELEASE_VERSION}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
