[tools]
go = "1.26.4"
pnpm = "latest"
node = "24.17"
"air" = "latest"
goreleaser = "latest"

[tasks.dev]
description = "Start the full dev stack with docker compose"
run = "docker compose up"

[tasks."dev:build"]
description = "Start the dev stack, rebuilding images"
run = "docker compose up --build"

[tasks."dev:server"]
description = "Run the Go server with live reload"
dir = "server"
env = { WS_ALLOWED_ORIGINS = "http://localhost:5173" }
run = "air"

[tasks."dev:web"]
description = "Run the web dev server"
dir = "web"
run = "pnpm dev"

[tasks."dev:local"]
description = "Run the server and web dev servers together (no docker)"
depends = ["dev:server", "dev:web"]

[tasks."openapi:export"]
description = "Generate the OpenAPI spec from the Go server"
dir = "server"
run = "go run . -open-api"

[tasks.openapi]
description = "Export the OpenAPI spec and regenerate the web SDK client"
depends = ["openapi:export"]
dir = "web"
run = "pnpm openapi:generate"

[tasks."format:server"]
description = "Format the Go server codebase"
dir = "server"
run = "gofmt -w ."

[tasks."format:web"]
description = "Format the web codebase"
dir = "web"
run = "pnpm format"

[tasks.format]
description = "Format the server and web codebases"
depends = ["format:server", "format:web"]

[tasks."lint:server"]
description = "Vet the Go server codebase"
dir = "server"
run = "go vet ./..."

[tasks."lint:web"]
description = "Lint the web codebase (prettier + eslint)"
dir = "web"
run = "pnpm lint"

[tasks.lint]
description = "Lint the server and web codebases"
depends = ["lint:server", "lint:web"]

[tasks.check]
description = "Type-check the web codebase"
dir = "web"
run = "pnpm check"

[tasks."test:server"]
description = "Run the Go server tests"
dir = "server"
run = "go test ./..."

[tasks.test]
description = "Run all tests"
depends = ["test:server"]
