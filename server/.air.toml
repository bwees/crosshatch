# Air config for live-reloading the Go server in development.
# https://github.com/air-verse/air
root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/crosshatch ."
entrypoint = "./tmp/crosshatch"
include_ext = ["go"]
exclude_dir = ["tmp", "data"]
exclude_regex = ["_test\\.go"]
stop_on_error = true
delay = 500

[log]
time = true

[misc]
clean_on_exit = true
